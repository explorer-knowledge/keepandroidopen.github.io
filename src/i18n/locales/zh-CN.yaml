# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "从 2026 年 9 月开始，Google 会阻止任何未在 Google 进行注册并提供身份证明的开发者的应用在 Android 设备上安装，这会影响全世界的 Android 设备。了解更多：{url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google 宣布全世界的 Android 应用开发者都必须统一注册、支付费用并提供身份证，否则他们的应用在所有设备上都会被拒绝安装。有超过 67 个组织反对这条政策。{url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "17 年来，Android 凭借其开放性与苹果拉开差距，现在 Google 强制要求所有应用都必须进行开发者注册，包括在 Play Store 以外分发的应用。{url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid，一个开源的 Android 应用市场，称 Google 现在的开发者验证行为对第三方应用分发构成了“存亡威胁”，EFF 警告这是在为审查铺路。{url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Google 提出的未验证应用安装流程需要九步、等待二十四小时，且全程依赖可由 Google 随时修改的 Play 服务。该方案从未在任何测试版中出现过。{url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Android 是作为一个开放的平台交付给我们的。现在 Google 想让所有开发者进行注册并提供身份证以便你安装他们的应用。别让他们背叛全球 30 亿名用户。{url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "如果你买了你这台手机，那么它就应该属于你。Google 的新的“开发者验证”意味着他们可以决定你的手机上被允许运行什么样的软件。和十万余人一同抵制它：{url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google 正在把 Android 变成围墙花园。强制交身份证、收注册费、侧载还要走九步“高级流程”？这不是安全防护，这是垄断手段。{url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "那么那些学生们开发的首个应用，和那些志愿者们构建的隐私工具，该怎么办？除非他们愿意接受 Google 的规则，不然 Google 的强制验证就会完全阻止他们的应用安装。{url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "Android 十七年来的开放岌岌可危。Google 阻止安装未验证应用的计划是对 F-Droid 和独立软件的沉重打击。阻止封锁：{url} @AlteredDeal #KeepAndroidOpen"

