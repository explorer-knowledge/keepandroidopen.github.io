# [en] social_callout_facebook_2: "F-Droid, the open-source Android app store used by millions, calls Google's developer verification an \"existential threat\" to its continued operation. over 67 organizations including the EFF, FSF, and Tor Project have signed an open letter opposing the policy. Learn why this matters: {url}"
social_callout_facebook_2: "F-Droid, de open-source Android-appstore die door miljoenen wordt gebruikt, noemt Googles ontwikkelaarsverificatie een \"existentiële bedreiging\" voor zijn voortbestaan. Meer dan 67 organisaties, waaronder de EFF, FSF en het Tor Project, hebben een open brief ondertekend die zich tegen het beleid verzet. Lees waarom dit ertoe doet: {url}"
# [en] social_callout_facebook_3: "Google's proposed workaround for installing unverified apps after their lockdown takes effect requires 9 steps, a mandatory 24-hour waiting period, and runs through Google Play Services (which Google can modify at any time). The community is being asked to accept a blog post as a safeguard. {url}"
social_callout_facebook_3: "Googles voorgestelde tijdelijke oplossing voor het installeren van niet-geverifieerde apps nadat hun lockdown van kracht is geworden, vereist 9 stappen, een verplichte wachttijd van 24 uur, en loopt via Google Play-services (die Google op elk moment kan wijzigen). De gemeenschap wordt gevraagd een blogpost als waarborg te accepteren. {url}"
# [en] social_callout_facebook_4: "Android's openness has been its defining characteristic for 17 years. Millions chose it over iPhone for exactly that reason. Google is now mandating developer registration for all apps, including those distributed outside the Play Store. Independent developers and open-source projects face the most impact. {url}"
social_callout_facebook_4: "Androids openheid is 17 jaar lang zijn bepalende kenmerk geweest. Miljoenen kozen het boven de iPhone om precies die reden. Google verplicht nu ontwikkelaarsregistratie voor alle apps, ook die buiten de Play Store worden verspreid. Onafhankelijke ontwikkelaars en open-source projecten worden het zwaarst geraakt. {url}"
# [en] social_callout_facebook_5: "The EFF calls app gatekeeping \"a pathway to censorship.\" Google's developer verification would give a single company the ability to block any app, from any developer, on any certified device worldwide. This sets a precedent that extends beyond Android to the future of personal computing. {url}"
social_callout_facebook_5: "De EFF noemt app-gatekeeping \"een weg naar censuur.\" Googles ontwikkelaarsverificatie zou één enkel bedrijf de mogelijkheid geven om elke app, van elke ontwikkelaar, op elk gecertificeerd apparaat ter wereld te blokkeren. Dit schept een precedent dat verder reikt dan Android, tot aan de toekomst van personal computing. {url}"
# [en] social_callout_facebook_6: "Your phone, your choice? Not if Google has its way. Starting in 2026, they plan to block any app whose developer hasn't registered and provided government ID. This affects everyone. {url}"
social_callout_facebook_6: "Jouw telefoon, jouw keuze? Niet als Google zijn zin krijgt. Vanaf 2026 zijn ze van plan elke app te blokkeren waarvan de ontwikkelaar zich niet heeft geregistreerd en geen identiteitsbewijs heeft overhandigd. Dit raakt iedereen. {url}"
# [en] social_callout_facebook_7: "Google is retroactively locking down billions of devices that were sold as open platforms. This 'rug pull' threatens independent developers and alternative app stores like F-Droid. {url}"
social_callout_facebook_7: "Google timmert met terugwerkende kracht miljarden apparaten dicht die als open platformen werden verkocht. Deze 'rug pull' bedreigt onafhankelijke ontwikkelaars en alternatieve app-stores zoals F-Droid. {url}"
# [en] social_callout_facebook_8: "Is your phone really yours? If Google can decide which apps you're allowed to install, the answer is no. Join the 100,000+ people fighting to keep Android open. {url}"
social_callout_facebook_8: "Is je telefoon echt van jou? Als Google kan beslissen welke apps je mag installeren, is het antwoord nee. Sluit je aan bij de 100.000+ mensen die strijden om Android open te houden. {url}"
# [en] social_callout_facebook_9: "Google's 9-step process for 'allowing' unverified apps is a trap. It's designed to be so difficult that nobody uses it, giving Google total control. {url}"
social_callout_facebook_9: "Googles 9-stappenproces voor het 'toestaan' van niet-geverifieerde apps is een val. Het is ontworpen om zo moeilijk te zijn dat niemand het gebruikt, waardoor Google volledige controle krijgt. {url}"
# [en] social_callout_facebook_10: "From students building their first apps to volunteers creating privacy tools, Google's mandatory registration policy will freeze out innovation. Help us keep Android open! {url}"
social_callout_facebook_10: "Van studenten die hun eerste apps bouwen tot vrijwilligers die privacytools maken: Googles verplichte registratiebeleid zal innovatie de pas afsnijden. Help mee Android open te houden! {url}"

