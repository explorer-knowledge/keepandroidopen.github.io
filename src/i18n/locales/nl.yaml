# Social share messages (rotated randomly; {url} is replaced at build time)
# [en] social_callout_x_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects every Android device worldwide. Learn more: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_1: "Vanaf september 2026 blokkeert Google elke Android-app waarvan de ontwikkelaar zich niet heeft geregistreerd en geen identiteitsbewijs heeft overlegd. Dit treft elk Android-apparaat ter wereld. Lees meer: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_2: "Google announced that all Android app developers must register centrally, pay a fee, and submit government ID, or their apps will be blocked on every device. over 67 organizations oppose this. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_2: "Google: alle Android-ontwikkelaars moeten zich registreren, een vergoeding betalen en een identiteitsbewijs overleggen, of hun apps worden geblokkeerd. Meer dan 67 organisaties verzetten zich. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_3: "Android's openness distinguished it from iPhone for 17 years. Google is now requiring mandatory developer registration for all apps, including those distributed outside the Play Store. {url} #KeepAndroidOpen"
social_callout_x_3: "Androids openheid onderscheidde het 17 jaar lang van de iPhone. Google verplicht nu ontwikkelaarsregistratie voor alle apps, ook die buiten de Play Store worden verspreid. {url} #KeepAndroidOpen"
# [en] social_callout_x_4: "F-Droid, the open-source Android app store, calls Google's developer verification an \"existential threat\" to alternative app distribution. The EFF warns it creates a pathway to censorship. {url} #KeepAndroidOpen"
social_callout_x_4: "F-Droid, de open-source Android-appstore, noemt Googles ontwikkelaarsverificatie een \"existentiële bedreiging\" voor alternatieve app-verspreiding. De EFF waarschuwt dat het een weg naar censuur opent. {url} #KeepAndroidOpen"
# [en] social_callout_x_5: "Google's proposed workaround for installing unverified apps requires 9 steps, a 24-hour wait, and runs through Play Services, which Google can modify at any time. It hasn't shipped in any beta. {url} #KeepAndroidOpen"
social_callout_x_5: "Googles voorgestelde tijdelijke oplossing voor het installeren van niet-geverifieerde apps vereist 9 stappen, 24 uur wachten, en loopt via Play-services, die Google op elk moment kan wijzigen. Het is in geen enkele bèta uitgebracht. {url} #KeepAndroidOpen"
# [en] social_callout_x_6: "Android was sold to us as an open platform. Now Google wants every developer to register and submit ID just to let you install their apps. Don't let them rug-pull 3 billion users. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_6: "Android werd ons verkocht als een open platform. Nu wil Google dat elke ontwikkelaar zich registreert en zich identificeert, alleen om jou hun apps te laten installeren. Laat ze 3 miljard gebruikers er niet zo tussen nemen. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_7: "If you bought your phone, you should own it. Google's new 'developer verification' means they decide what software you're allowed to run on your own property. Join the 100k+ signers opposing this: {url} #KeepAndroidOpen"
social_callout_x_7: "Als je je telefoon hebt gekocht, hoor je ook de eigenaar te zijn. Googles 'ontwikkelaarsverificatie' betekent dat zij beslissen welke software je mag draaien. Sluit je aan bij de 100.000+ ondertekenaars hiertegen: {url} #KeepAndroidOpen"
# [en] social_callout_x_8: "Google is turning Android into a walled garden. Mandatory ID, registration fees, and a 9-step 'advanced flow' for sideloading? That's not security, it's a monopoly move. {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_8: "Google verandert Android in een walled garden. Verplichte identificatie, registratiekosten en een 9-stappen 'uitgebreide procedure' voor sideloading? Dat is geen beveiliging, dat is een monopolie-zet. {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_x_9: "What happens to the student's first app, or the privacy tool built by a volunteer? Google's mandatory registration blocks them all by default unless they play by Google's rules. {url} #KeepAndroidOpen"
social_callout_x_9: "Wat gebeurt er met de eerste app van een student, of de privacytool gebouwd door een vrijwilliger? Googles verplichte registratie blokkeert ze allemaal standaard, tenzij ze zich aan Googles regels houden. {url} #KeepAndroidOpen"
# [en] social_callout_x_10: "17 years of Android openness are at risk. Google's plan to block unverified apps is a direct hit on F-Droid and independent software. Stop the lockdown: {url} @AlteredDeal #KeepAndroidOpen"
social_callout_x_10: "17 jaar Android-openheid staat op het spel. Googles plan om niet-geverifieerde apps te blokkeren is een directe klap voor F-Droid en onafhankelijke software. Stop de lockdown: {url} @AlteredDeal #KeepAndroidOpen"
# [en] social_callout_linkedin_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification before their software can be installed on any device. This applies to all apps, not just those on the Play Store. over 67 organizations have signed an open letter opposing the policy. {url} #KeepAndroidOpen"
social_callout_linkedin_1: "Vanaf september 2026 verplicht Google elke Android-app-ontwikkelaar zich centraal te registreren en een identiteitsbewijs te overhandigen voordat hun software op enig apparaat geïnstalleerd kan worden. Dit geldt voor alle apps, niet alleen die in de Play Store. Meer dan 67 organisaties hebben een open brief tegen dit beleid ondertekend. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_2: "Android's openness has been its distinguishing feature for nearly two decades. Google is now mandating developer registration for all Android apps, including those distributed through alternative stores like F-Droid. The EFF, FSF, Tor Project, and dozens of other organizations are raising serious concerns. {url} #KeepAndroidOpen"
social_callout_linkedin_2: "Androids openheid is bijna twee decennia lang zijn onderscheidende kenmerk geweest. Google verplicht nu ontwikkelaarsregistratie voor alle Android-apps, ook die welke via alternatieve stores zoals F-Droid worden verspreid. De EFF, FSF, het Tor Project en tientallen andere organisaties uiten ernstige zorgen. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_3: "Google's developer verification program would give a single company the technical ability to block any app, from any developer, on any certified Android device worldwide. This affects independent developers, open-source projects, and the principle that you control the software on hardware you own. {url} #KeepAndroidOpen"
social_callout_linkedin_3: "Googles ontwikkelaarsverificatieprogramma zou één enkel bedrijf de technische mogelijkheid geven om elke app, van elke ontwikkelaar, op elk gecertificeerd Android-apparaat ter wereld te blokkeren. Dit raakt onafhankelijke ontwikkelaars, open-source projecten, en het principe dat jij de software op je eigen hardware bepaalt. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_4: "F-Droid estimates 85% of its open-source apps could face distribution issues under Google's new developer verification rules. The requirement for government ID and signing keys creates barriers for anonymous contributors, developers in sanctioned countries, and volunteer-maintained projects. {url} #KeepAndroidOpen"
social_callout_linkedin_4: "F-Droid schat dat 85% van zijn open-source apps verspreidingsproblemen kan krijgen onder Googles nieuwe regels voor ontwikkelaarsverificatie. De eis van een identiteitsbewijs en ondertekeningssleutels werpt drempels op voor anonieme bijdragers, ontwikkelaars in gesanctioneerde landen en projecten die door vrijwilligers worden onderhouden. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_5: "Google's proposed \"advanced flow\" for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and runs entirely through Google Play Services. The community has been asked to accept a blog post as a functional safeguard. It has not appeared in any beta release. {url} #KeepAndroidOpen"
social_callout_linkedin_5: "Googles voorgestelde \"uitgebreide procedure\" voor het sideloaden van niet-geverifieerde apps vereist 9 stappen, een verplichte wachttijd van 24 uur, en loopt volledig via Google Play-services. De gemeenschap wordt gevraagd een blogpost te accepteren als functionele waarborg. Het is in geen enkele bèta-release verschenen. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_6: "Digital sovereignty is at stake. Google's plan to mandate developer registration for all Android apps—even those distributed outside the Play Store—creates a central point of control and potential censorship for 3 billion devices. {url} #KeepAndroidOpen"
social_callout_linkedin_6: "Digitale soevereiniteit staat op het spel. Googles plan om ontwikkelaarsregistratie verplicht te stellen voor alle Android-apps, ook die buiten de Play Store worden verspreid, creëert een centraal controlepunt en mogelijke censuur voor 3 miljard apparaten. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_7: "The 'Keep Android Open' campaign has gained support from over 67 global organizations. We are opposing Google's plan to block any application whose developer hasn't registered centrally and provided government ID. Read the open letter: {url} #KeepAndroidOpen"
social_callout_linkedin_7: "De 'Keep Android Open'-campagne heeft steun gekregen van meer dan 67 organisaties wereldwijd. We verzetten ons tegen Googles plan om elke applicatie te blokkeren waarvan de ontwikkelaar zich niet centraal heeft geregistreerd en geen identiteitsbewijs heeft overhandigd. Lees de open brief: {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_8: "Retroactively changing the rules for hardware people already own is a dangerous precedent. Google's mandatory developer verification strips users of their agency and forces them into a managed ecosystem. {url} #KeepAndroidOpen"
social_callout_linkedin_8: "Met terugwerkende kracht de regels veranderen voor hardware die mensen al bezitten is een gevaarlijk precedent. Googles verplichte ontwikkelaarsverificatie ontneemt gebruikers hun handelingsvrijheid en dwingt hen in een gecontroleerd ecosysteem. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_9: "F-Droid and the EFF have raised the alarm: Google's developer verification program is an 'existential threat' to alternative app distribution. We must protect the open-source ecosystem that built Android. {url} #KeepAndroidOpen"
social_callout_linkedin_9: "F-Droid en de EFF hebben alarm geslagen: Googles ontwikkelaarsverificatieprogramma is een 'existentiële bedreiging' voor alternatieve app-verspreiding. We moeten het open-source ecosysteem beschermen waarop Android is gebouwd. {url} #KeepAndroidOpen"
# [en] social_callout_linkedin_10: "As Google moves to further entrench its gatekeeping status, the community is pushing back. Your device should be your property, not a leased terminal subject to retroactive restrictions. Join the movement: {url} #KeepAndroidOpen"
social_callout_linkedin_10: "Terwijl Google zijn gatekeeper-positie verder probeert te verankeren, vecht de gemeenschap terug. Je apparaat hoort je eigendom te zijn, geen geleased apparaat dat onderhevig is aan beperkingen met terugwerkende kracht. Sluit je aan bij de beweging: {url} #KeepAndroidOpen"
# [en] social_callout_bluesky_1: "Starting September 2026, Google will block any Android app whose developer hasn't registered and provided government ID. This affects all apps, not just Play Store apps. F-Droid calls it an \"existential threat.\" @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_1: "Vanaf september 2026 blokkeert Google elke Android-app waarvan de ontwikkelaar niet geregistreerd of geïdentificeerd is. Treft alle apps, niet alleen Play Store. F-Droid: \"existentiële bedreiging\". @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_2: "Google is requiring all Android developers to register centrally, pay a fee, and submit government ID. Apps from unregistered developers will be silently blocked. over 67 organizations oppose this. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_2: "Google verplicht alle Android-ontwikkelaars zich te registreren, een vergoeding te betalen en een identiteitsbewijs in te leveren. Apps van niet-geregistreerden worden stilletjes geblokkeerd. Meer dan 67 organisaties verzetten zich. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_3: "After 17 years of marketing Android as an open platform, Google is mandating developer registration for all apps. Independent developers, open-source contributors, and alternative stores like F-Droid face an uncertain future. @keepandroidopen.bsky.social {url}"
