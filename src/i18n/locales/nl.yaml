# [en] social_callout_bluesky_6: "Google's plan to block unverified apps is a 'rug pull' on the 3 billion people who chose Android for its openness. Don't let them turn your phone into a walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
social_callout_bluesky_6: "Googles plan om niet-geverifieerde apps te blokkeren is een 'rug pull' voor de 3 miljard mensen die voor Android kozen om zijn openheid. Laat ze je telefoon niet veranderen in een walled garden. @keepandroidopen.bsky.social #KeepAndroidOpen {url}"
# [en] social_callout_bluesky_7: "Ownership means control. If Google can block any app on your phone, you don't really own it. Join the 100,000+ people fighting to keep Android open. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_7: "Eigendom betekent controle. Als Google elke app op je telefoon kan blokkeren, ben je niet echt de eigenaar. Sluit je aan bij de 100.000+ mensen die strijden om Android open te houden. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_8: "Mandatory ID registration for every app developer? This is a dream for censors and a nightmare for privacy. Protect the open web and open mobile. @keepandroidopen.bsky.social {url}"
social_callout_bluesky_8: "Verplichte identiteitsregistratie voor elke app-ontwikkelaar? Een droom voor censoren en een nachtmerrie voor privacy. Bescherm het open web en open mobiel. @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_9: "Sideloading shouldn't require a 24-hour waiting period and a 9-step gauntlet. Google's 'advanced flow' is designed to fail. Keep Android Open! @keepandroidopen.bsky.social {url}"
social_callout_bluesky_9: "Sideloading hoort geen wachttijd van 24 uur en een hindernisbaan van 9 stappen te vergen. Googles 'uitgebreide procedure' is ontworpen om te falen. Houd Android open! @keepandroidopen.bsky.social {url}"
# [en] social_callout_bluesky_10: "From F-Droid to independent devs, the entire Android ecosystem is under threat from Google's new mandatory registration decree. See why 67+ orgs are saying no: {url}"
social_callout_bluesky_10: "Van F-Droid tot onafhankelijke ontwikkelaars: het hele Android-ecosysteem wordt bedreigd door Googles nieuwe verplichte registratiebesluit. Lees waarom 67+ organisaties nee zeggen: {url}"
# [en] social_callout_mastodon_1: "Starting September 2026, Google will require every Android app developer to register centrally, provide government ID, and submit signing keys. Apps from unregistered developers will be blocked on all certified devices worldwide. This threatens F-Droid, open-source distribution, and user autonomy. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_1: "Vanaf september 2026 verplicht Google elke Android-app-ontwikkelaar zich centraal te registreren, een identiteitsbewijs te overhandigen en ondertekeningssleutels in te leveren. Apps van niet-geregistreerde ontwikkelaars worden geblokkeerd op alle gecertificeerde apparaten ter wereld. Dit bedreigt F-Droid, open-source verspreiding en de autonomie van gebruikers. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_2: "Google's Android Developer Verification program requires government ID, signing keys, and a fee for any developer who wants their software installable on Android. The EFF calls app gatekeeping \"a pathway to censorship.\" over 67 organizations have signed an open letter opposing it. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_2: "Googles Android Developer Verification-programma vereist een identiteitsbewijs, ondertekeningssleutels en een vergoeding van elke ontwikkelaar die wil dat zijn software installeerbaar is op Android. De EFF noemt app-gatekeeping \"een weg naar censuur.\" Meer dan 67 organisaties hebben een open brief ondertekend die zich hiertegen verzet. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_3: "F-Droid, home to thousands of free and open-source Android apps, calls Google's developer verification an \"existential threat.\" An estimated 85% of F-Droid apps could face distribution issues because their developers signed through F-Droid, not through Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_3: "F-Droid, thuisbasis van duizenden vrije en open-source Android-apps, noemt Googles ontwikkelaarsverificatie een \"existentiële bedreiging.\" Naar schatting 85% van de F-Droid-apps kan verspreidingsproblemen krijgen omdat hun ontwikkelaars via F-Droid hebben ondertekend, en niet via Google. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_4: "Google's proposed workaround for sideloading unverified apps requires 9 steps, a mandatory 24-hour waiting period, and is delivered through Google Play Services, not the Android OS. Google can modify or remove it at any time without user consent. It hasn't shipped in any beta. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_4: "Googles voorgestelde tijdelijke oplossing voor het sideloaden van niet-geverifieerde apps vereist 9 stappen, een verplichte wachttijd van 24 uur, en wordt geleverd via Google Play-services, niet via het Android-besturingssysteem. Google kan het op elk moment wijzigen of verwijderen zonder toestemming van de gebruiker. Het is in geen enkele bèta uitgebracht. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_5: "The mandatory developer registration Google is imposing on Android raises concerns for developers in sanctioned countries, anonymous open-source contributors, and anyone building privacy or security tools. Google has a documented history of complying with government demands to remove apps. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_5: "De verplichte ontwikkelaarsregistratie die Google aan Android oplegt, baart zorgen voor ontwikkelaars in gesanctioneerde landen, anonieme open-source bijdragers en iedereen die privacy- of beveiligingstools bouwt. Google heeft een gedocumenteerde geschiedenis van meewerken aan overheidseisen om apps te verwijderen. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_6: "Android's strength was its decentralized nature. Google's plan to mandate central registration for every single app developer destroys that. We must resist this centralization of power. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_6: "De kracht van Android lag in zijn gedecentraliseerde aard. Googles plan om centrale registratie verplicht te stellen voor elke afzonderlijke app-ontwikkelaar vernietigt dat. We moeten ons tegen deze machtsconcentratie verzetten. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_7: "If you bought the hardware, you should have the final say on the software. Google's plan to block unverified apps is a direct attack on user sovereignty. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_7: "Als je de hardware hebt gekocht, hoor jij het laatste woord te hebben over de software. Googles plan om niet-geverifieerde apps te blokkeren is een directe aanval op de soevereiniteit van de gebruiker. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_mastodon_8: "Imagine a world where every small hobbyist or volunteer dev has to register with a global corporation just to share their work. That's the world Google is building for Android in 2026. {url} @keepandroidopen@techhub.social"
social_callout_mastodon_8: "Stel je een wereld voor waarin elke kleine hobbyist of vrijwillige ontwikkelaar zich moet registreren bij een wereldwijd bedrijf, alleen om zijn werk te delen. Dat is de wereld die Google in 2026 voor Android bouwt. {url} @keepandroidopen@techhub.social"
# [en] social_callout_mastodon_9: "Google's 'advanced flow' for sideloading is a deterrence mechanism, not an escape hatch. 9 steps and a 24-hour wait for software you own? No thanks. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
social_callout_mastodon_9: "Googles 'uitgebreide procedure' voor sideloading is een afschrikkingsmechanisme, geen nooduitgang. 9 stappen en 24 uur wachten voor software die je bezit? Nee, bedankt. @keepandroidopen@techhub.social #KeepAndroidOpen {url}"
# [en] social_callout_mastodon_10: "Over 100,000 people and 67+ organizations are standing up to Google's attempt to lock down Android. Join the fight for a truly open mobile ecosystem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
social_callout_mastodon_10: "Meer dan 100.000 mensen en 67+ organisaties komen in opstand tegen Googles poging om Android dicht te timmeren. Sluit je aan bij de strijd voor een werkelijk open mobiel ecosysteem. {url} @keepandroidopen@techhub.social #KeepAndroidOpen"
# [en] social_callout_facebook_1: "Starting September 2026, Google will require every Android app developer to register centrally and provide government-issued identification. Apps from unregistered developers will be blocked on all certified Android devices worldwide. This applies to all apps, not just those on the Play Store. Learn more: {url}"
