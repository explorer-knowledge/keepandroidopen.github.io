# What Google is doing
# [en] what_heading: "What Google is doing"
what_heading: "Wat Google van plan is"
# [en] what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: >-
  In augustus 2025 [kondigde](https://developer.android.com/developer-verification) Google een nieuwe verplichting aan: vanaf september 2026 **moet iedere Android-app-ontwikkelaar
  zich centraal registreren bij Google** voordat hun software op enig apparaat geïnstalleerd kan worden. Niet alleen Play Store-apps: álle apps. Dit geldt ook voor
  apps die tussen vrienden gedeeld worden, die via [F-Droid](https://f-droid.org) verspreid worden, of die door hobbyisten voor eigen gebruik gebouwd worden.
  Onafhankelijke ontwikkelaars, kerk- en gemeenschapsgroepen en hobbyisten worden allemaal buitengesloten van het ontwikkelen en verspreiden van hun software.
# [en] what_registration: "Registration requires:"
what_registration: "Voor registratie is het volgende vereist:"
# [en] what_req_fee: "Paying a fee to Google"
what_req_fee: "Een vergoeding aan Google betalen"
# [en] what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Akkoord gaan met de algemene voorwaarden van Google"
# [en] what_req_id: "Surrendering your government-issued identification"
what_req_id: "Je identiteitsbewijs overhandigen"
# [en] what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Bewijs leveren van je privé-ondertekeningssleutel"
# [en] what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Alle huidige en toekomstige applicatie-identificatiecodes opsommen"
# [en] what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Als een ontwikkelaar zich er niet aan houdt, worden zijn apps stilletjes geblokkeerd op elk Android-apparaat overal ter wereld."

# Who this hurts
# [en] impact_heading: "Who this hurts"
impact_heading: "Wie hier de dupe van wordt"
# [en] impact_you_heading: "You"
impact_you_heading: "Jij"
# [en] impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Je hebt een Android-telefoon gekocht omdat Google je vertelde dat hij open was. Je kon installeren wat je wilde, en dat was de afspraak."
# [en] impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: >-
  Google herschrijft die afspraak nu, met terugwerkende kracht, op hardware die jij al bezit. Na de update kun je alleen nog software draaien die Google vooraf
  heeft goedgekeurd. Op jouw telefoon: *jouw* eigendom, waarvoor *jij* hebt betaald.
# [en] impact_dev_heading: "Independent developers"
impact_dev_heading: "Onafhankelijke ontwikkelaars"
# [en] impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: >-
  De eerste app van een tiener, een privacytool van een vrijwilliger, of een vertrouwelijke interne bèta van een bedrijf. Het maakt niet uit. Na september 2026
  kan geen daarvan geïnstalleerd worden zonder Googles zegen.
# [en] impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: >-
  [F-Droid](https://f-droid.org), thuisbasis van duizenden vrije en open-source Android-apps, heeft dit een
  ["existentiële" bedreiging](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html) genoemd.
  Cory Doctorow noemt het ["Darth Android"](https://pluralistic.net/2025/09/01/fulu/).
# [en] impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Overheden en maatschappelijk middenveld"
# [en] impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: >-
  Google heeft een [gedocumenteerde staat van dienst](https://www.aclu.org/news/free-speech/app-store-oligopoly) in het meewerken wanneer autoritaire regimes om
  het verwijderen van apps vragen. Met dit programma bestaat de software die de instituties van je land draait bij de gratie van één enkele, niet ter
  verantwoording te roepen buitenlandse onderneming.
# [en] impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: >-
  De [EFF noemt](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app-gatekeeping "een steeds verder
  uitdijende route naar internetcensuur."

# Advanced flow
# [en] flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "Googles \"nooduitgang\" is een valluik"
# [en] flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: >-
  Google zegt dat "power users" niet-geverifieerde apps
  ["alsnog kunnen installeren"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html). Zo ziet dat er *daadwerkelijk* uit:
# [en] flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Ga naar de systeeminstellingen en zoek de Ontwikkelaarsopties op"
# [en] flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Tik **zeven keer** op het buildnummer om de ontwikkelaarsmodus te activeren"
# [en] flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Klik de schrikschermen over dwang weg"
# [en] flow_step4: "Enter your PIN"
flow_step4: "Voer je pincode in"
# [en] flow_step5: "Restart the device"
flow_step5: "Start het apparaat opnieuw op"
# [en] flow_step6: "**Wait 24 hours**"
flow_step6: "**Wacht 24 uur**"
# [en] flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Kom terug, klik nog meer schrikschermen weg"
# [en] flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Kies \"tijdelijk toestaan\" (7 dagen) of \"onbeperkt toestaan\""
# [en] flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Bevestig, nogmaals, dat je \"de risico's\" begrijpt"
# [en] flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Negen stappen. Een verplichte bedenktijd van 24 uur. *Om software te installeren op een apparaat dat je bezit.*"
# [en] flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: >-
  Erger nog: dit proces loopt volledig via **Google Play-services**, niet via het Android-besturingssysteem. Google kan het op elk moment wijzigen, aanscherpen of
  stopzetten, zonder dat daar een OS-update of toestemming voor nodig is. En tot op heden is het in geen enkele bèta-, preview- of canary-build uitgebracht. Het
  bestaat alleen als een blogpost en wat mockups.

# Precedent
# [en] precedent_heading: "This is bigger than Android"
precedent_heading: "Dit gaat verder dan alleen Android"
# [en] precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: >-
  Als Google met terugwerkende kracht miljarden apparaten kan dichttimmeren die als open platformen verkocht zijn, kijkt elke hardwarefabrikant op de planeet
  goed mee.
# [en] precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: >-
  Het principe dat hier wordt gevestigd: **het bedrijf dat jouw apparaat heeft gemaakt mag, nadat je het hebt gekocht, beslissen welke software je mag draaien.**
  In software heet dit een "rug pull"; maar daar kon je tenminste nog concurrerende software installeren. In hardware is het een *fait accompli* dat je je
  handelingsvrijheid ontneemt en je machteloos maakt tegenover de grillen van één enkele, niet ter verantwoording te roepen gatekeeper en veroordeelde
  monopolist.
# [en] precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: >-
  Androids openheid was nooit slechts een functie. Het was de *belofte* die het onderscheidde van de iPhone. Miljoenen kozen voor Android om precies die reden.
  Google trekt die belofte nu eenzijdig in, op apparaten die *al in de zakken van mensen zitten*, omdat ze hebben besloten dat ze genoeg marktdominantie en
  regulatory capture hebben om er mee weg te komen.
# [en] precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: >-
  [Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/):
  *"Googles jaloezie op Apple dreigt de open erfenis van Android te ontmantelen."*

# Objections
# [en] objections_heading: "But wait, isn't this..."
objections_heading: "Maar wacht, is dit niet..."
# [en] obj_security_q: "\"...just about security?\""
obj_security_q: "\"...gewoon een kwestie van veiligheid?\""
# [en] obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: >-
  Het veiligheidsargument is een rookgordijn. Google Play Protect scant al op malware, onafhankelijk van de identiteit van de ontwikkelaar. Een identiteitsbewijs
  eisen maakt de code niet veiliger. Het maakt *ontwikkelaars* identificeerbaar en controleerbaar. Malware-auteurs kunnen zich gewoon registreren. Indie-ontwikkelaars
  en dissidenten vaak niet. De [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is duidelijk:
  identiteitsgebaseerde gatekeeping is een censuurinstrument, geen beveiligingsinstrument.
# [en] obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...nog steeds sideloaden als je de uitgebreide procedure gebruikt?\""
# [en] obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: >-
  Negen stappen, 24 uur wachten, verstopt in de Ontwikkelaarsopties, geleverd via een propriëtaire dienst die Google op elk moment kan intrekken. Dat is geen
  sideloading. Dat is een **afschrikkingsmechanisme**, gebouwd om ervoor te zorgen dat bijna niemand het doorloopt. En omdat het via Play-services loopt in
  plaats van via het OS, kan Google het stilletjes aanscherpen of stopzetten.
# [en] obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...alleen een probleem als je iets te verbergen hebt?\""
# [en] obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: >-
  Klokkenluiders, journalisten en activisten onder autoritaire regeringen zullen de eerste slachtoffers zijn. Daarna mensen in situaties van huiselijk geweld.
  Al deze groepen hebben legitieme redenen om software te verspreiden of te gebruiken zonder hun juridische identiteit in een database van Google achter te laten.
  Anonieme open-source bijdragen zijn een traditie die ouder is dan Google zelf. Dit beleid maakt daar op Android een einde aan.
# [en] obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...hetzelfde wat Apple doet?\""
# [en] obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: >-
  Apple is vanaf dag één een walled garden geweest. Mensen kozen voor Android *omdat het anders was*. "Apple doet het ook" is een race naar de bodem en een
  zwak *tu quoque*-argument. En onder regelgevingsdruk (de Digital Markets Act van de EU) wordt zelfs Apple gedwongen zich open te stellen. Google beweegt in
  de tegenovergestelde richting: het probeert zijn gatekeeper-status verder te verankeren.
# [en] obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...gewoon 25 dollar en wat papierwerk?\""
# [en] obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: >-
  Misschien, als je een ontwikkelaar in de VS bent met een creditcard en een rijbewijs. Probeer eens een student in sub-Sahara-Afrika te zijn, of een dissident
  in Myanmar, of een vrijwilliger die een gezondheidsapp voor de gemeenschap onderhoudt. De kosten zijn niet alleen financieel: je levert je identiteitsbewijs en
  het bewijs van je ondertekeningssleutels in bij een bedrijf dat
  [routinematig meewerkt](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) aan overheidsverzoeken om apps te verwijderen en
  ontwikkelaars te ontmaskeren.

