# What Google is doing
# what_heading: "What Google is doing"
what_heading: "Hvad Google har gang i"
# what_intro: "In August 2025, Google [announced](https://developer.android.com/developer-verification) a new requirement: starting September 2026, **every Android app developer must register centrally with Google** before their software can be installed on any device. Not just Play Store apps: all apps. This includes apps shared between friends, distributed through [F-Droid](https://f-droid.org), built by hobbyists for personal use. Independent developers, church and community groups, and hobbyists alike will all be frozen out of being able to develop and distribute their software."
what_intro: "I august 2025 [annoncerede](https://developer.android.com/developer-verification) Google et nyt krav: fra september 2026 **skal alle Android-appudviklere registrere sig centralt hos Google** før deres software kan installeres på nogen som helst enhed. Ikke bare apps hentet fra Play Store: alle apps. Dette inkluderer apps delt mellem venner, distribueret gennem [F-Droid](https://f-droid.org) eller bygget af entusiaster til personligt brug. Uafhængige udviklere, kirker og almennyttige foreninger, hobbybrugere og deslige vil alle blive udelukket fra at udvikle og distribuere deres software."
# what_registration: "Registration requires:"
what_registration: "Registrering kræver:"
# what_req_fee: "Paying a fee to Google"
what_req_fee: "Betaling af et gebyr til Google"
# what_req_terms: "Agreeing to Google's Terms and Conditions"
what_req_terms: "Accept af Googles vilkår og betingelser"
# what_req_id: "Surrendering your government-issued identification"
what_req_id: "Overgivelse af din statsligt udstedte identifikation"
# what_req_signing: "Providing evidence of your private signing key"
what_req_signing: "Bevis for ejerskab af din private kryptografiske signaturnøgle"
# what_req_appids: "Listing all current and all future application identifiers"
what_req_appids: "Oplistning af alle nuværende og alle fremtidige applikations-identifikationsstrenge"
# what_pullquote: "If a developer does not comply, their apps get silently blocked on every Android device worldwide."
what_pullquote: "Hvis en udvikler ikke indordner sig bliver deres apps uden varsel blokeret på enhver Android-enhed på verdensplan."

# Who this hurts
# impact_heading: "Who this hurts"
impact_heading: "Hvem det går ud over"
# impact_you_heading: "You"
impact_you_heading: "Dig"
# impact_you_p1: "You bought an Android phone because Google told you it was open. You could install what you wanted, and that was the deal."
impact_you_p1: "Du har købt en Android-telefon fordi Google sagde den var åben. Du kunne installere hvad du ville og det var en del af aftalen."
# impact_you_p2: "Google is now rewriting that deal, retroactively, on hardware you already own. After the update lands, you can only run software that Google has pre-approved. On your phone: *your* property, that *you* paid for."
impact_you_p2: "Google omskriver nu aftalen, med tilbagevirkende kraft, gældende for hardware du allerede ejer. Efter opdateringen kan du kun køre software som Google på forhånd har godkendt. På din mobiltelefon: *din* ejendom, som *du* har betalt for."
# impact_dev_heading: "Independent developers"
impact_dev_heading: "Uafhængige udviklere"
# impact_dev_p1: "A teenager's first app, a volunteer's privacy tool, or a company's confidential internal beta. It doesn't matter. After September 2026, none of these can be installed without Google's blessing."
impact_dev_p1: "En teenagers første app, en frivilligs privatlivsværktøj eller et firmas fortrolige interne betaversion. Brugen er underordnet. Efter september 2026 kan ingen af disse installeres uden Googles velsignelse."
# impact_dev_p2: "[F-Droid](https://f-droid.org), home to thousands of free and open-source Android apps, has called this an [\"existential\" threat](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow calls it [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
impact_dev_p2: "[F-Droid](https://f-droid.org), som er hjem for tusinder af fri og open source Android-apps, har kaldt dette en [\"eksistentiel\" trussel](https://f-droid.org/en/2025/09/29/google-developer-registration-decree.html). Cory Doctorow kalder det [\"Darth Android\"](https://pluralistic.net/2025/09/01/fulu/)."
# impact_gov_heading: "Governments & civil society"
impact_gov_heading: "Regeringer & civilsamfund"
# impact_gov_p1: "Google has a [documented track record](https://www.aclu.org/news/free-speech/app-store-oligopoly) of complying when authoritarian regimes demand app removals. With this program, the software that runs your country's institutions will exist at the pleasure of a single unaccountable foreign corporation."
impact_gov_p1: "Google har fremvist [en historik](https://www.aclu.org/news/free-speech/app-store-oligopoly) hvor de indordner sig når autoritære regimer forlanger apps fjernet. Med denne opførsel, er softwaren der driver dit lands institutioner kun tilgængelig fordi det passer en enkelt uansvarlig udenlandsk virksomhed."
# impact_gov_p2: "The [EFF calls](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) app gatekeeping \"an ever-expanding pathway to internet censorship.\""
impact_gov_p2: "Foreningen [EFF kalder](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) dette ønske om at være portvagt for apps en \"evigt ekspanderende glidebane mod internetcensur.\""

# Advanced flow
# flow_heading: "Google's \"escape hatch\" is a trap door"
flow_heading: "Googles \"nødluge\" er en faldlem"
# flow_intro: "Google says \"power users\" can [\"still install\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) unverified apps. Here's what that *actually* looks like:"
flow_intro: "Google siger at \"avancerede brugere\" stadig [\"vil kunne installere\"](https://android-developers.googleblog.com/2026/03/android-developer-verification.html) uverificerede apps gennem et \"avanceret flow\". Nedenfor er illustreret hvordan dette *rent faktisk* vil foregå:"
# flow_step1: "Delve into System Settings, find Developer Options"
flow_step1: "Grav ned i System-indstillinger og find Om telefonen"
# flow_step2: "Tap the build number **seven times** to enable Developer Mode"
flow_step2: "Tryk byggenummeret **syv gange** for at slå udviklertilstand til"
# flow_step3: "Dismiss scare screens about coercion"
flow_step3: "Bekræft skræmmedialoger omkring faren ved at gøre dette under pres"
# flow_step4: "Enter your PIN"
flow_step4: "Indtast din PIN-kode"
# flow_step5: "Restart the device"
flow_step5: "Gentart enheden"
# flow_step6: "**Wait 24 hours**"
flow_step6: "**Vent 24 timer**"
# flow_step7: "Come back, dismiss more scare screens"
flow_step7: "Vend tilbage, bekræft flere skræmmedialoger"
# flow_step8: "Pick \"allow temporarily\" (7 days) or \"allow indefinitely\""
flow_step8: "Vælg mellem \"tillad midlertidigt\" (7 dage) eller \"tillad ubegrænset\""
# flow_step9: "Confirm, again, that you understand \"the risks\""
flow_step9: "Bekræft, igen, at du forstår \"risiciene\""
# flow_summary: "Nine steps. A mandatory 24-hour cooling-off period. *For installing software on a device you own.*"
flow_summary: "Ni trin. En obligatorisk 24-timers venteperiode. *For at installere software på en enhed du ejer.*"
# flow_detail: "Worse: this flow runs entirely through **Google Play Services**, not the Android OS. Google can change it, tighten it, or kill it at any time, with no OS update required and no consent needed. And as of today, it hasn't shipped in any beta, preview, or canary build. It exists only as a blog post and some mockups."
flow_detail: "Og værre endnu: dette flow foregår udelukkende gennem **Google Play Services**, ikke som en del af selve Androids operativsystem. Google kan ændre det, stramme det eller slå det fra til enhver tid, uden at det kræver en operativsystemopdatering og uden samtykke. Og indtil videre er det ikke tilgængeligt i nogen betaversion, test eller udvikler-udgivelse. Det eksisterer kun som et blog-indlæg og nogle mockups."

# Precedent
# precedent_heading: "This is bigger than Android"
precedent_heading: "Dette er større end Android"
# precedent_pullquote: "If Google can retroactively lock down billions of devices that were sold as open platforms, every hardware manufacturer on the planet is watching."
precedent_pullquote: "Hvis Google får lov til retroaktivt at låse milliarder af enheder der oprindeligt blev solgt som åbne platforme, så vil enhver hardwarefabrikant på planeten kigge interesseret med."
# precedent_p1: "The principle being established: **the company that made your device gets to decide, after you've bought it, what software you're allowed to run.** In software, this is called a \"rug pull\"; but at least you could always install competing software. In hardware, it is a *fait accompli* that strips you of your agency and renders you powerless to the whims of a single unaccountable gatekeeper and convicted monopolist."
precedent_p1: "Princippet der stadfæstes: **virksomheden som producerede din enhed må bestemme, efter du har købt den, hvilken software du må køre på den.** Indenfor software kaldes dette \"at trække tæppet\"; men her kan du i det mindste installere konkurrerende software. Med hardware, er det en endegyldig handling som fratager dig din råderet og gør dig magtesløs overfor en enkelt uansvarlig portvagt og dømt monopolist."
# precedent_p2: "Android's openness was never just a feature. It was the *promise* that distinguished it from iPhone. Millions chose Android for exactly that reason. Google is now revoking that promise unilaterally, on devices *already* in people's pockets, because they've decided they have enough market dominance and regulatory capture to get away with it."
precedent_p2: "Androids åbenhed var aldrig bare en feature. Det var *løftet* som adskilte det fra iPhone. Millioner valgte Android af præcis den grund. Google trækker nu fuldstændigt ensidigt i land på det løfte, for enheder som *allerede* er i folks lommer, bare fordi de mener de har nok markedsdominans og indflydelse hos lovgivere til at de kan slippe af sted med det."
# precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Google's Apple envy threatens to dismantle Android's open legacy.\"*"
precedent_arstechnica: "[Ars Technica](https://arstechnica.com/gadgets/2026/03/with-developer-verification-googles-apple-envy-threatens-to-dismantle-androids-open-legacy/): *\"Googles misundelse mod Apple truer med at afmontere Androids åbne arv.\"*"

# Objections
# objections_heading: "But wait, isn't this..."
objections_heading: "Men vent lige, er dette ikke..."
# obj_security_q: "\"...just about security?\""
obj_security_q: "\"...bare et spørgsmål om sikkerhed?\""
# obj_security_a: "The security rationale is a smokescreen. Google Play Protect already scans for malware independent of developer identity. Requiring a government ID doesn't make code safer. It makes *developers* identifiable and controllable. Malware authors can register. Indie developers and dissidents often can't. The [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) is blunt: identity-based gatekeeping is a censorship tool, not a security one."
obj_security_a: "Sikkerhedsrationalet er et røgslør. Google Play Protect skanner allerede for malware uafhængigt af udviklerens identitiet. Krav om statslig identifikation gør ikke kode mere sikker. Det gør *udviklere* identificerbare og kontrollerbare. Udviklere af malware kan også registrere sig. Uafhængige udviklere og dissidenter kan ofte ikke. Foreningen [EFF](https://www.eff.org/deeplinks/2025/11/application-gatekeeping-ever-expanding-pathway-internet-censorship) lægger ikke fingre imellem: en sådan identitetsbaseret portvagt for apps er et censurværktøj ikke en sikkerhedsanordning."
# obj_sideloading_q: "\"...still sideloading if you use the advanced flow?\""
obj_sideloading_q: "\"...stadig sideloading hvis du bruger det avancerede flow?\""
# obj_sideloading_a: "Nine steps, 24-hour wait, buried in Developer Options, delivered through a proprietary service that Google can revoke whenever they want. That's not sideloading. That's a **deterrence mechanism** built to ensure almost nobody completes it. And since it runs through Play Services rather than the OS, Google can tighten or kill it silently."
obj_sideloading_a: "Ni trin, 24-timers ventetid, gemt i Udviklingsindstillinger, distribueret gennem en proprietær service som Google kan trække tilbage når det passer dem. Det er ikke sideloading. Det er en **afskrækkelsesmekanisme** bygget til at sikre at nærmest ingen gennemfører det. Og da det kører gennem Play Services, ikke som en del af operativsystemet, kan Google stramme eller fjerne det uden varsel."
# obj_hide_q: "\"...only a problem if you have something to hide?\""
obj_hide_q: "\"...kun et problem hvis du har noget at skjule?\""
# obj_hide_a: "Whistleblowers, journalists, and activists under authoritarian governments will be the first victims. People in domestic abuse situations are next. All these groups have legitimate reasons to distribute or use software without putting their legal identity in a Google database. Anonymous open-source contribution is a tradition older than Google itself. This policy ends it on Android."
obj_hide_a: "Whistleblowere, journalister og aktivister i autoritære regeringer vil være de første ofre. Mennesker i voldelige forhold er de næste. Disse grupper har legitime grunde til at distribuere og anvende software uden at deres identitet skal lagres i en Google-database. Anonyme bidrag til open source er en tradition som strækker sig længere tilbage end Google. Denne ændring slutter dette for Android."
# obj_apple_q: "\"...the same thing Apple does?\""
obj_apple_q: "\"...det samme som Apple gør?\""
# obj_apple_a: "Apple has been a walled garden from day one. People chose Android *because it was different*. \"Apple does it too\" is a race to the bottom and a weak *tu quoque* argument. And under regulatory pressure (the EU's Digital Markets Act), even Apple is being forced to open up. Google is moving in the opposite direction: attempting to further entrench its gatekeeping status."
obj_apple_a: "Apple har været lukket fra dag et. Folk har valgt Android *fordi det var anderledes*. \"Apple gør det samme\" er et ræs mod bunden og et svagt *også du* argument. Og under lovgivningspres (EUs Digital Markets Act), tvinges selv Apple til at lukke op. Google bevæger sig i den modsatte retning: forsøger at forskanse sin portvagtstatus yderligere."
# obj_cost_q: "\"...just $25 and some paperwork?\""
obj_cost_q: "\"...bare et lille gebyr og noget papirarbejde?\""
# obj_cost_a: "Maybe, if you're a developer in the US with a credit card and a driver's license. Try being a student in sub-Saharan Africa, or a dissident in Myanmar, or a volunteer maintaining a community health app. The cost isn't only financial: you're surrendering government ID and evidence of your signing keys to a company that [routinely complies](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) with government demands to remove apps and expose developers."
obj_cost_a: "Måske, hvis du er en udvikler i USA med et kreditkort og et kørekort. Forestil dig at være studerende i det sydlige Afrika, en dissident i Myanmar eller en frivillig som vedligeholder en sundhedsapp for et lokalfællesskab. Omkostningen er ikke kun økonomisk: du overgiver statslig identifikation og beviser for dine kryptografiske nøgler til en virksomhed som [rutinemæssigt efterkommer](https://www.theregister.com/2025/08/26/android_developer_verification_sideloading/) regeringers krav om at blokere apps og identificere udviklere."

